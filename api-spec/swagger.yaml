openapi: 3.0.3
info:
  title: Real Todo API
  version: 1.0.0
  description: |
    `api/src` 配下の NestJS 実装を基に作成した OpenAPI 定義です。
    アプリケーションは `main.ts` で `api` の global prefix と `v1` の URI versioning を有効にしているため、
    実際のベース URL は `/api/v1` です。
servers:
  - url: /api/v1
tags:
  - name: App
  - name: Auth
  - name: Users
  - name: Tasks
  - name: Projects
  - name: Tags
  - name: BulkTasks
paths:
  /:
    get:
      tags: [App]
      summary: API バージョン取得
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: ログイン
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          headers:
            Set-Cookie:
              schema:
                type: string
              description: '`rememberMe=true` の場合は `refreshToken` Cookie を返します。'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: リフレッシュトークン再発行
      security: []
      parameters:
        - in: cookie
          name: refreshToken
          required: false
          schema:
            type: string
          description: '`rememberMe` 利用時に保存される Cookie。'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 再発行成功
          headers:
            Set-Cookie:
              schema:
                type: string
              description: '新しい `refreshToken` Cookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: リフレッシュ失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    delete:
      tags: [Auth]
      summary: リフレッシュトークン Cookie の削除
      security: []
      responses:
        '200':
          description: Cookie 削除成功
  /users/me:
    get:
      tags: [Users]
      summary: 自分のユーザー情報取得
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/tasks:
    get:
      tags: [Tasks]
      summary: タスク一覧取得
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: dateType
          schema:
            type: string
            enum: [deadline, startedAt, updatedAt, createdAt]
        - in: query
          name: sortType
          schema:
            type: string
            enum: [deadline, startedAt, updatedAt, createdAt]
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: projectId
          schema:
            type: string
            format: uuid
        - in: query
          name: status[]
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/TaskStatus'
          description: 'タスク状態の配列。実装上 `status[]` 形式で送る想定です。'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Tasks]
      summary: タスク作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskArrayResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/tasks/{id}:
    get:
      tags: [Tasks]
      summary: タスク詳細取得
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not Found
    patch:
      tags: [Tasks]
      summary: タスク更新
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/tasks/{id}/archive:
    put:
      tags: [Tasks]
      summary: タスクをアーカイブ
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/tasks/{id}/complete:
    put:
      tags: [Tasks]
      summary: タスクを完了
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/tasks/{id}/reopen:
    put:
      tags: [Tasks]
      summary: タスクを再オープン
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /bulk/tasks/archive:
    put:
      tags: [BulkTasks]
      summary: タスク一括アーカイブ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkTaskRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /bulk/tasks/complete:
    put:
      tags: [BulkTasks]
      summary: タスク一括完了
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkTaskRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /bulk/tasks/reopen:
    put:
      tags: [BulkTasks]
      summary: タスク一括再オープン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkTaskRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListOnlyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/projects:
    get:
      tags: [Projects]
      summary: プロジェクト一覧取得
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
        - in: query
          name: status
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ProjectStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Projects]
      summary: プロジェクト作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 作成成功
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/projects/{slug}:
    get:
      tags: [Projects]
      summary: プロジェクト詳細取得
      parameters:
        - $ref: '#/components/parameters/ProjectSlug'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not Found
    patch:
      tags: [Projects]
      summary: プロジェクト更新
      parameters:
        - $ref: '#/components/parameters/ProjectSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 更新成功
        '400':
          description: 更新対象なし
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/projects/{slug}/archive:
    patch:
      tags: [Projects]
      summary: プロジェクトをアーカイブ
      parameters:
        - $ref: '#/components/parameters/ProjectSlug'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/projects/{slug}/reopen:
    patch:
      tags: [Projects]
      summary: プロジェクトを再オープン
      parameters:
        - $ref: '#/components/parameters/ProjectSlug'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/tags:
    get:
      tags: [Tags]
      summary: タグ一覧取得
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Page'
        - in: query
          name: status[]
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/TagStatus'
        - in: query
          name: sortType
          schema:
            type: string
            enum: [updatedAt, createdAt]
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /projects/{slug}/milestones:
    get:
      tags: [Projects]
      summary: プロジェクトのマイルストーン一覧取得
      parameters:
        - $ref: '#/components/parameters/ProjectSlug'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MilestoneCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /projects/{slug}/milestones/{id}/archive:
    put:
      tags: [Projects]
      summary: マイルストーンをアーカイブ
      parameters:
        - $ref: '#/components/parameters/ProjectSlug'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Not Found
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
      description: 1 ページの件数
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
      description: 1 始まりのページ番号
    TaskId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ProjectSlug:
      in: path
      name: slug
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: 認証失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
  schemas:
    VersionResponse:
      type: object
      required: [version]
      properties:
        version:
          type: string
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    UnauthorizedError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 401
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          example: Unauthorized
        error:
          type: string
          example: Unauthorized
    UUID:
      type: string
      format: uuid
    TaskStatus:
      type: string
      enum: [initial, scheduled, completed, archived]
    TaskKind:
      type: string
      enum: [task, milestone]
    ProjectStatus:
      type: string
      enum: [initial, active, archived]
    TagStatus:
      type: string
      enum: [enabled, disabled]
    PageInfo:
      type: object
      required: [page, limit, sortOrder, sortType, hasNext, hasPrevious, totalCount]
      properties:
        page:
          type: integer
        limit:
          type: integer
        sortOrder:
          type: string
          enum: [asc, desc]
        sortType:
          type: string
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean
        totalCount:
          type: integer
    AuthToken:
      type: object
      required: [uuid, accessToken, refreshToken]
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        accessToken:
          type: string
        refreshToken:
          type: string
    AuthTokenResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AuthToken'
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        rememberMe:
          type: boolean
    RefreshRequest:
      type: object
      required: [uuid]
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
    User:
      type: object
      required: [uuid, username, email, status, createdAt, updatedAt]
      properties:
        uuid:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, deactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/User'
    Tag:
      type: object
      properties:
        id:
          type: integer
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        status:
          $ref: '#/components/schemas/TagStatus'
        userId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Task:
      type: object
      properties:
        id:
          type: integer
        uuid:
          $ref: '#/components/schemas/UUID'
        title:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        kind:
          $ref: '#/components/schemas/TaskKind'
        deadline:
          type: string
          format: date
        startingAt:
          type: string
          format: date
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
        parentId:
          type: integer
          nullable: true
        userId:
          type: integer
        projectId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        project:
          $ref: '#/components/schemas/Project'
        parent:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Task'
        children:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
    ProjectStats:
      type: object
      properties:
        total:
          type: integer
        kinds:
          type: object
          properties:
            milestone:
              type: integer
            task:
              type: integer
        states:
          type: object
          properties:
            scheduled:
              type: integer
            completed:
              type: integer
            archived:
              type: integer
    Project:
      type: object
      properties:
        id:
          type: integer
        uuid:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        deadline:
          type: string
          format: date-time
        startingAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        slug:
          type: string
        goal:
          type: string
        shouldbe:
          type: string
          nullable: true
        userId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        stats:
          $ref: '#/components/schemas/ProjectStats'
    TaskResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Task'
    TaskArrayResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    TaskListOnlyResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    TaskListResponse:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    ProjectResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Project'
    ProjectListResponse:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    TagListResponse:
      type: object
      required: [data, pageInfo]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
    MilestoneCollection:
      type: object
      required: [milestones, orphans]
      properties:
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        orphans:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    MilestoneCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/MilestoneCollection'
    CreateTaskRequest:
      type: object
      required: [title, projectId, deadline, status, kind]
      properties:
        title:
          type: string
        projectId:
          $ref: '#/components/schemas/UUID'
        deadline:
          type: string
          format: date
        startingAt:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        kind:
          $ref: '#/components/schemas/TaskKind'
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        projectId:
          $ref: '#/components/schemas/UUID'
        status:
          $ref: '#/components/schemas/TaskStatus'
        deadline:
          type: string
          format: date
        finishedAt:
          type: string
          format: date
        startingAt:
          type: string
          format: date
    BulkTaskRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UUID'
    MilestoneInput:
      type: object
      required: [title, deadline]
      properties:
        title:
          type: string
        deadline:
          type: string
          format: date
    CreateProjectRequest:
      type: object
      required: [name, deadline, status, slug, goal]
      properties:
        name:
          type: string
        deadline:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/ProjectStatus'
        slug:
          type: string
        goal:
          type: string
        shouldbe:
          type: string
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/MilestoneInput'
    UpdateProjectRequest:
      type: object
      required: [name, deadline, slug, goal]
      properties:
        name:
          type: string
        deadline:
          type: string
          format: date
        slug:
          type: string
        goal:
          type: string
        shouldbe:
          type: string
security:
  - BearerAuth: []
